resources:
  jobs:
    pipeline_atividade_rocket:
      name: pipeline_atividade_rocket
      schedule:
        quartz_cron_expression: 9 0 13 * * ?
        timezone_id: America/Sao_Paulo
        pause_status: UNPAUSED
      tasks:
        - task_key: land_to_bronze
          notebook_task:
            notebook_path: /Workspace/Users/mickael.dxd@gmail.com/atividade_rockerlab/bronze/Atividade_land_to_bronze
            base_parameters:
              data_inicio: 01-01-2016
              data_fim: 12-31-2018
            source: WORKSPACE
        - task_key: bronze_to_silver
          depends_on:
            - task_key: land_to_bronze
          notebook_task:
            notebook_path: /Workspace/Users/mickael.dxd@gmail.com/atividade_rockerlab/silver/Atividade_bronze_to_silver
            source: WORKSPACE
        - task_key: silver_to_gold
          depends_on:
            - task_key: bronze_to_silver
          notebook_task:
            notebook_path: /Workspace/Users/mickael.dxd@gmail.com/atividade_rockerlab/gold/Atividade_silver_to_gold
            source: WORKSPACE
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED
